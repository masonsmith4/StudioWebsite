<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orion Studio</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0d1117, #1f2937);
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* Navigation bar */
    nav {
      width: 100%;
      background-color: #111827;
      padding: 1rem 0;
      display: flex;
      justify-content: center;
      gap: 2rem;
      position: sticky;
      top: 0;
    }

    nav a {
      color: #00bfff;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: #38bdf8;
    }

    /* Main content */
    main {
      text-align: center;
      margin-top: 10vh;
    }

    h1 {
      font-size: 3rem;
      color: #00bfff;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 1.2rem;
      color: #9ca3af;
      margin-bottom: 2rem;
    }

    footer {
      margin-top: auto;
      padding: 1rem;
      font-size: 0.9rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="projects.html">Projects</a>
    <a href="summary.html">Personal Summary</a>
    <a href="contact.html">Contact</a>
  </nav>

  <main>
    <h1>Welcome to Orion Studio</h1>
    <p>Your creative space is live and ready.</p>
  </main>

  <footer>© 2026 Orion Studio</footer>
</body>
</html>
